# Zytek Solutions — Nginx Configuration (Security Hardened)
# Replace: zyteksolutions.com with your actual domain

# ── Hide Nginx version from error pages and Server header ─────────────────
server_tokens off;

server {
    listen 80;
    server_name zyteksolutions.com www.zyteksolutions.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zyteksolutions.com www.zyteksolutions.com;

    # ── SSL Certificates (Let's Encrypt) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/zyteksolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zyteksolutions.com/privkey.pem;

    # ── Modern SSL configuration ───────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ── Root directory ─────────────────────────────────────────────────────
    root /var/www/zytek-solutions/dist/public;
    index index.html;

    # ── Rate limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=site:10m rate=30r/s;
    limit_req zone=site burst=60 nodelay;
    limit_req_status 429;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # ── Hashed assets — immutable cache ───────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Static files — short cache ─────────────────────────────────────────
    location ~* \.(svg|ico|webmanifest|txt|xml|png|jpg|jpeg|webp|woff2|woff)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Block dotfiles (.env, .git, .htaccess, etc.) ──────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block backup and config files ─────────────────────────────────────
    location ~* \.(bak|conf|dist|fla|inc|ini|log|psd|sh|sql|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── SPA fallback — all routes → index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ── Custom error pages (never expose Nginx internals) ─────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
